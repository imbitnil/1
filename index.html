<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home - Bittu</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0e0d0b;--paper:#f7f5f0;--cream:#ede9e1;--sidebar:#1a1714;
  --gold:#c8a455;--gold-lt:#e8c97a;--muted:#7a756d;--border:#d8d2c8;
  --red:#c0392b;--green:#27ae60;
  --serif:"Libre Baskerville",Georgia,serif;
  --sans:"IBM Plex Sans",sans-serif;
  --mono:"IBM Plex Mono",monospace;
}
html{scroll-behavior:smooth;}

/* FIX: prevent horizontal overflow at root level */
html,body{overflow-x:hidden;max-width:100%;}

body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;line-height:1.6;}
canvas{display:block;width:100%!important;height:auto;}

#wrapper{display:flex;min-height:100vh;overflow-x:hidden;width:100%;}

/* FIX: marquee bleed uses clip instead of negative margin overflow */
.marquee-bleed{width:100vw;position:relative;left:50%;transform:translateX(-50%);}

/* SIDEBAR */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--sidebar);display:flex;flex-direction:column;z-index:100;transition:transform 0.3s ease;overflow-y:auto;}

.sb-profile{padding:1.8rem 2rem 1.4rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;}
.sb-avatar{width:76px;height:76px;border-radius:0;object-fit:cover;object-position:center top;border:2.5px solid var(--gold);margin-bottom:0.9rem;display:block;flex-shrink:0;}
.sb-name{font-family:var(--serif);font-size:1.08rem;font-weight:700;color:#f7f5f0;letter-spacing:-0.01em;}
.sb-role{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-top:0.22rem;font-family:var(--mono);}

.sb-ticker{padding:0.75rem 1.6rem;border-bottom:1px solid rgba(255,255,255,0.07);font-family:var(--mono);font-size:0.64rem;}
.tick-row{display:flex;justify-content:space-between;align-items:center;padding:0.16rem 0;}
.tick-sym{color:rgba(247,245,240,0.4);letter-spacing:0.05em;}
.tick-val{color:#f7f5f0;font-weight:500;}
.tick-up{color:var(--green);font-size:0.6rem;}
.tick-dn{color:var(--red);font-size:0.6rem;}

.sb-nav{flex:1;padding:1.1rem 0;}
.sb-nav-label{font-size:0.55rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(247,245,240,0.2);padding:0 1.6rem 0.5rem;font-family:var(--mono);}
.sb-nav-link{display:flex;align-items:center;gap:0.72rem;padding:0.52rem 1.6rem;font-size:0.8rem;font-weight:400;color:rgba(247,245,240,0.42);cursor:pointer;transition:color 0.2s,background 0.2s;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);letter-spacing:0.01em;}
.sb-nav-link:hover,.sb-nav-link.active{color:#f7f5f0;background:rgba(255,255,255,0.04);}
.sb-nav-link.active{color:var(--gold);border-right:2px solid var(--gold);}
.sb-nav-link svg{width:14px;height:14px;flex-shrink:0;opacity:0.4;}
.sb-nav-link.active svg,.sb-nav-link:hover svg{opacity:1;}

.sb-minichart{padding:1rem 1.6rem;border-top:1px solid rgba(255,255,255,0.07);}
.sb-minichart-label{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(247,245,240,0.2);margin-bottom:0.55rem;}
.sb-quote{padding:1.1rem 1.6rem;border-top:1px solid rgba(255,255,255,0.07);}
.sb-quote-text{font-family:var(--serif);font-style:italic;font-size:0.74rem;line-height:1.6;color:rgba(247,245,240,0.32);}
.sb-quote-attr{font-size:0.58rem;font-family:var(--mono);color:rgba(200,164,85,0.4);margin-top:0.55rem;letter-spacing:0.06em;}

/* MAIN */
#main{margin-left:280px;flex:1;min-height:100vh;min-width:0;/* FIX: prevent flex child overflow */}

/* FIX: topbar is sticky and contains the hamburger on mobile */
#topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(247,245,240,0.97);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0.75rem;
  padding:0 3rem;
  height:52px;
}
.topbar-breadcrumb{font-family:var(--mono);font-size:0.64rem;color:var(--muted);letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.topbar-cta{padding:0.4rem 1.05rem;background:var(--ink);color:var(--paper);border:none;font-family:var(--sans);font-size:0.68rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.topbar-cta:hover{background:var(--gold);color:var(--ink);}

/* FIX: hamburger lives inside topbar on mobile — hidden on desktop */
#mob-toggle{
  display:none;
  background:none;border:none;
  padding:0.35rem 0.4rem;
  cursor:pointer;
  line-height:0;
  flex-shrink:0;
  order:-1; /* always first */
}
#mob-toggle span{display:block;width:20px;height:1.5px;background:var(--ink);margin:4px 0;transition:all 0.3s;}

#content{padding:3rem;max-width:960px;overflow-x:hidden;}

/* prevent any child from causing horizontal scroll */
#content *{max-width:100%;}

/* TABLET */
@media(max-width:1024px){
  #sidebar{width:240px;}
  #main{margin-left:240px;}
  #topbar{padding:0 2rem;}
  #content{padding:2rem;max-width:100%;}
  .sec-title{font-size:clamp(1.5rem,2.5vw,2.5rem);}
}

/* MOBILE */
@media(max-width:768px){
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:260px;
    transform:translateX(-100%);
    z-index:200;
  }
  #sidebar.open{transform:translateX(0);box-shadow:8px 0 32px rgba(0,0,0,0.45);}
  #main{margin-left:0;}

  /* FIX: show hamburger inside topbar */
  #mob-toggle{display:block;}
  #topbar{padding:0 1rem;}

  #content{padding:1.2rem 1rem;max-width:100%;}
  .marquee-bleed{width:100vw;left:50%;transform:translateX(-50%);}

  .about-grid,.contact-grid,.nl-block,.card-grid,.book-grid,.form-row{grid-template-columns:1fr!important;}
  .res-grid{grid-template-columns:repeat(2,1fr);}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .chart-wrap{padding:0.85rem 0.75rem;}
  .chart-header{flex-direction:column;gap:0.48rem;}
  .post-item{grid-template-columns:1fr;gap:0.65rem;}
  .post-arr{display:none;}
  .featured-post{padding:1.3rem;}
  .featured-post .post-ttl{font-size:1.15rem!important;}
  .nl-block{padding:1.7rem 1.3rem;}
  .photo-box{aspect-ratio:4/3;}
  .sec-title{font-size:clamp(1.55rem,6vw,2.3rem)!important;}
  .sb-avatar{width:62px;height:62px;}
}

@media(max-width:480px){
  #content{padding:1rem 0.85rem;}
  .res-grid{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .sec-title{font-size:clamp(1.2rem,5vw,1.8rem)!important;}
  .home-hero-title{font-size:clamp(1.4rem,2.5vw,1.8rem);}
  p{word-break:break-word;}
  .pullquote p{font-size:0.85rem;}
  .chart-wrap{display:none;}
  .contact-form{padding:0;}
  .form-row{grid-template-columns:1fr;}
}

/* sidebar overlay */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;opacity:0;transition:opacity 0.3s;}
#sidebar-overlay.active{display:block;opacity:1;}

.page{animation:pageIn 0.35s ease both;}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.55s ease,transform 0.55s ease;}
.reveal.visible{opacity:1;transform:none;}

.sec-eyebrow{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:0.7rem;margin-bottom:0.75rem;}
.sec-eyebrow::after{content:"";flex:0 0 22px;height:1px;background:var(--gold);}
.sec-title{font-family:var(--serif);font-size:clamp(2rem,3.5vw,3.2rem);font-weight:700;line-height:1.15;letter-spacing:-0.02em;margin-bottom:1.25rem;}

.pullquote{border-left:2px solid var(--gold);padding:0.72rem 1.25rem;margin:2rem 0;background:rgba(200,164,85,0.05);}
.pullquote p{font-family:var(--serif);font-style:italic;font-size:0.96rem;line-height:1.65;color:#3a3530;}
.pullquote cite{display:block;font-family:var(--mono);font-size:0.62rem;color:var(--muted);margin-top:0.42rem;letter-spacing:0.06em;font-style:normal;}

/* CHARTS */
.chart-wrap{background:var(--ink);border:1px solid #2a2520;padding:1.4rem;margin:1.8rem 0;position:relative;overflow:hidden;}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.9rem;}
.chart-ticker{font-family:var(--mono);font-size:0.8rem;font-weight:500;color:#f7f5f0;letter-spacing:0.06em;}
.chart-price{font-family:var(--mono);font-size:1.3rem;font-weight:500;color:#f7f5f0;margin-top:0.08rem;}
.chart-change{font-family:var(--mono);font-size:0.68rem;padding:2px 7px;border-radius:2px;display:inline-block;margin-top:0.18rem;}
.chg-up{background:rgba(39,174,96,0.14);color:var(--green);}
.chg-dn{background:rgba(192,57,43,0.14);color:var(--red);}
.chart-period-btns{display:flex;gap:0.38rem;flex-wrap:wrap;}
.period-btn{font-family:var(--mono);font-size:0.58rem;padding:2px 7px;border:1px solid rgba(255,255,255,0.1);background:none;color:rgba(247,245,240,0.38);cursor:pointer;transition:all 0.15s;}
.period-btn.active,.period-btn:hover{background:var(--gold);color:var(--ink);border-color:var(--gold);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin:2.2rem 0;}
.stat-cell{background:var(--paper);padding:1.3rem;}
.stat-num{font-family:var(--serif);font-size:2rem;font-weight:700;line-height:1;letter-spacing:-0.02em;}
.stat-lbl{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:0.32rem;}

.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-top:1.8rem;}
.card-item{background:var(--paper);padding:1.7rem;}
.card-num{font-family:var(--serif);font-size:2.6rem;font-weight:700;color:var(--border);line-height:1;}
.card-title{font-family:var(--serif);font-size:1rem;font-weight:700;margin:0.4rem 0 0.45rem;}
.card-body{font-size:0.83rem;color:var(--muted);line-height:1.75;}

/* MARQUEE */
.marquee-bar{background:var(--ink);padding:0.68rem 0;overflow:hidden;white-space:nowrap;}
.marquee-inner{display:inline-flex;animation:marquee 30s linear infinite;}
.marquee-inner span{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(247,245,240,0.26);padding:0 1.8rem;}
.marquee-inner span.ma{color:var(--gold);}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* POSTS */
.post-list{margin-top:1.4rem;}
.post-item{display:grid;grid-template-columns:1fr auto;gap:1.4rem;align-items:center;padding:1.5rem 0;border-bottom:1px solid var(--border);cursor:pointer;transition:padding-left 0.2s;}
.post-item:first-child{border-top:1px solid var(--border);}
.post-item:hover{padding-left:0.55rem;}
.post-tag{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.32rem;}
.post-ttl{font-family:var(--serif);font-size:1.15rem;font-weight:700;line-height:1.3;margin-bottom:0.32rem;}
.post-exc{font-size:0.83rem;color:var(--muted);line-height:1.7;max-width:520px;}
.post-meta{font-family:var(--mono);font-size:0.61rem;color:var(--muted);margin-top:0.45rem;letter-spacing:0.04em;}
.post-arr{width:36px;height:36px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.post-item:hover .post-arr{border-color:var(--gold);background:var(--gold);}
.post-arr svg{width:13px;height:13px;}
.featured-post{background:var(--ink);padding:2rem;cursor:pointer;transition:background 0.2s;position:relative;overflow:hidden;margin-bottom:1px;}
.featured-post::before{content:"FEATURED";position:absolute;top:1.1rem;right:1.1rem;font-family:var(--mono);font-size:0.5rem;letter-spacing:0.2em;color:rgba(200,164,85,0.32);}
.featured-post:hover{background:#1f1c19;}
.featured-post .post-tag{color:var(--gold);}
.featured-post .post-ttl{color:#f7f5f0;font-size:1.45rem;}
.featured-post .post-exc{color:rgba(247,245,240,0.4);}
.featured-post .post-meta{color:rgba(247,245,240,0.26);}

.filters{display:flex;gap:0.45rem;flex-wrap:wrap;margin-bottom:1.8rem;}
.filter-btn{padding:0.3rem 0.82rem;border:1px solid var(--border);background:none;font-family:var(--mono);font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.filter-btn:hover,.filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* NEWSLETTER */
.nl-block{background:var(--ink);padding:2.6rem;margin-top:2.8rem;display:grid;grid-template-columns:1fr 1fr;gap:2.8rem;align-items:center;position:relative;overflow:hidden;}
.nl-block::after{content:"";position:absolute;top:-20%;right:-10%;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(200,164,85,0.055) 0%,transparent 70%);pointer-events:none;}
.nl-title{font-family:var(--serif);font-size:1.65rem;font-weight:700;color:#f7f5f0;margin-top:0.45rem;line-height:1.25;}
.nl-sub{font-size:0.84rem;color:rgba(247,245,240,0.36);margin-top:0.55rem;line-height:1.7;}
.nl-form{display:flex;flex-direction:column;gap:0.6rem;}
.nl-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);padding:0.78rem 1.05rem;font-family:var(--sans);font-size:0.84rem;color:#f7f5f0;outline:none;transition:border-color 0.2s;width:100%;}
.nl-input::placeholder{color:rgba(247,245,240,0.2);}
.nl-input:focus{border-color:var(--gold);}
.nl-btn{background:var(--gold);color:var(--ink);border:none;padding:0.78rem;font-family:var(--sans);font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.nl-btn:hover{background:var(--gold-lt);}
.nl-note{font-family:var(--mono);font-size:0.56rem;color:rgba(247,245,240,0.16);letter-spacing:0.05em;}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
.photo-box{background:var(--ink);aspect-ratio:3/4;position:relative;overflow:hidden;}
.photo-box img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.photo-box-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);}
.photo-box-tag{position:absolute;bottom:1.3rem;left:1.3rem;background:rgba(247,245,240,0.95);padding:0.8rem 1.05rem;border-left:2px solid var(--gold);}
.photo-box-tag strong{font-size:0.8rem;font-weight:600;}
.photo-box-tag span{display:block;font-family:var(--mono);font-size:0.58rem;color:var(--muted);letter-spacing:0.06em;margin-top:0.16rem;}
.about-body{font-size:0.93rem;line-height:1.9;color:#3d3930;}
.about-body p+p{margin-top:1.05rem;}
.rules-list{margin-top:2rem;display:flex;flex-direction:column;gap:0.7rem;}
.rule-item{display:flex;gap:0.9rem;padding:0.85rem 1.05rem;border:1px solid var(--border);align-items:flex-start;}
.rule-n{font-family:var(--serif);font-size:1.15rem;font-weight:700;color:var(--gold);line-height:1;flex-shrink:0;}
.rule-item p{font-size:0.84rem;line-height:1.75;color:#4a463f;}

/* RESOURCES */
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:1.8rem;}
.res-card{background:var(--paper);padding:1.7rem;transition:background 0.2s;cursor:pointer;text-decoration:none;color:inherit;display:block;}
.res-card:hover{background:#f0ece3;}
.res-icon{width:32px;height:32px;color:var(--gold);margin-bottom:1rem;}
.res-title{font-family:var(--serif);font-size:0.98rem;font-weight:700;margin-bottom:0.42rem;}
.res-body{font-size:0.79rem;color:var(--muted);line-height:1.7;}
.res-link{display:inline-block;font-family:var(--mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-top:0.85rem;}
.books-section{margin-top:3.8rem;}
.books-section h2{font-family:var(--serif);font-size:1.7rem;font-weight:700;margin-bottom:1.3rem;}
.book-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);}
.book-item{background:var(--paper);padding:1.05rem;display:flex;gap:0.9rem;align-items:flex-start;}
.book-n{font-family:var(--serif);font-size:1.6rem;font-weight:700;color:var(--border);line-height:1;flex-shrink:0;}
.book-info h4{font-family:var(--serif);font-size:0.88rem;font-weight:700;margin-bottom:0.16rem;}
.book-info span{font-family:var(--mono);font-size:0.61rem;color:var(--muted);}
.book-info p{font-size:0.76rem;color:var(--muted);margin-top:0.32rem;line-height:1.6;}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
.contact-body{font-size:0.91rem;line-height:1.85;color:#3d3930;}
.contact-body p+p{margin-top:1rem;}
.channels{display:flex;flex-direction:column;gap:0.65rem;margin-top:1.7rem;}
.channel{display:flex;align-items:center;gap:0.9rem;padding:0.8rem 1.05rem;border:1px solid var(--border);text-decoration:none;color:inherit;transition:border-color 0.2s;}
.channel:hover{border-color:var(--gold);}
.channel svg{width:16px;height:16px;flex-shrink:0;color:var(--muted);}
.channel-name{font-size:0.72rem;font-weight:600;letter-spacing:0.04em;}
.channel-val{font-family:var(--mono);font-size:0.64rem;color:var(--muted);margin-top:0.1rem;}
.contact-form{display:flex;flex-direction:column;gap:0.62rem;}
.contact-form h3{font-family:var(--serif);font-size:1.2rem;font-weight:700;margin-bottom:0.38rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.62rem;}
.f-input{background:var(--cream);border:1px solid var(--border);padding:0.78rem 1rem;font-family:var(--sans);font-size:0.84rem;color:var(--ink);outline:none;transition:border-color 0.2s;width:100%;}
.f-input::placeholder{color:var(--muted);}
.f-input:focus{border-color:var(--gold);}
textarea.f-input{resize:vertical;min-height:105px;}
.f-btn{background:var(--ink);color:var(--paper);border:none;padding:0.84rem;font-family:var(--sans);font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
.f-btn:hover{background:var(--gold);color:var(--ink);}

/* POST */
.post-back{display:inline-flex;align-items:center;gap:0.48rem;font-family:var(--mono);font-size:0.64rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;margin-bottom:1.3rem;transition:color 0.2s;padding:0;}
.post-back:hover{color:var(--ink);}
.post-back svg{width:12px;height:12px;}
.post-header{border-bottom:1px solid var(--border);padding-bottom:1.7rem;margin-bottom:1.9rem;}
.post-tag-line{font-family:var(--mono);font-size:0.61rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:0.65rem;}
.post-main-title{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:700;line-height:1.15;letter-spacing:-0.02em;}
.post-byline{display:flex;align-items:center;gap:0.85rem;margin-top:1.3rem;font-family:var(--mono);font-size:0.64rem;color:var(--muted);letter-spacing:0.04em;flex-wrap:wrap;}
.post-byline strong{color:var(--ink);font-weight:500;}

  {id:"breakouts",tag:"Technical Analysis",read:"8 min",date:"Apr 5, 2025",
   title:"Why Most Breakouts Fail (And What the Good Ones Have in Common)",
   excerpt:"The textbook breakout looks clean. In real markets, 70% fail within a week. Here's what separates the ones that go from the ones that don't.",
   body:`<p>Breakouts are the most discussed setup in trading. They're also one of the most misunderstood. Most traders see a stock clear a resistance level and assume the hard work is done. It isn't.</p><h2>Volume Is Everything</h2><p>A breakout without volume expansion is noise. The best breakouts typically show 150&ndash;300% of average daily volume on the breakout day. That volume is institutional buying. You can't fake it.</p><blockquote><p>Price tells you what happened. Volume tells you why.</p></blockquote><h2>The Relative Strength Test</h2><p>Before the breakout day, the stock should already be outperforming the market over 3, 6, and 12 months. Leadership stocks that break out in dull markets perform significantly better than laggards breaking out in rallying markets.</p><h2>What Causes the Failure</h2><p>Most failed breakouts share a few traits: low volume, extended base duration, or a market environment that isn't supporting upside. I only take breakout trades when at least 55% of S&amp;P 500 stocks are above their 50-day moving average.</p>`},
  {id:"mindset",tag:"Psychology",read:"6 min",date:"Mar 28, 2025",
   title:"The Single Biggest Mistake Traders Make (It's Not What You Think)",
   excerpt:"It's not picking the wrong stocks. It's not bad timing. The mistake that ends more careers than any other is something far more mundane.",
   body:`<p>The thing that ends trading careers most often is position sizing &mdash; specifically, taking outsized risk on trades that feel like certainties.</p><h2>Certainty Is the Enemy</h2><p>The more certain you feel about a trade, the more dangerous it becomes. Certainty comes from narrative. But obvious trades are priced in.</p><blockquote><p>Your conviction about a trade has no correlation to its outcome. Size consistently, always.</p></blockquote><h2>The Fix</h2><p>I risk the same percentage of my account on every trade. Not a range &mdash; a fixed number. The discipline isn't in finding better trades. It's in treating every trade identically and letting the edge play out over hundreds of repetitions.</p>`},
  {id:"possizing",tag:"Risk Management",read:"6 min",date:"Mar 14, 2025",
   title:"Position Sizing for Volatile Markets: My Current Framework",
   excerpt:"Volatility changes everything about how much risk you should take per trade. Here's the exact framework I use when the VIX spikes.",
   body:`<p>When the VIX is at 14, I trade differently than when it's at 28. Most traders don't adjust &mdash; they keep the same position sizes and wonder why their equity curve looks different in different market regimes.</p><h2>The Core Principle</h2><p>Risk a fixed dollar amount per trade, not a fixed number of shares. I target 0.5&ndash;1% of my total account on each trade.</p><blockquote><p>Position size = (Account &times; Risk%) &divide; (Entry price &minus; Stop price)</p></blockquote><h2>Adjusting for Volatility</h2><p>In high-VIX environments, I use ATR-based stops &mdash; 1.5&ndash;2&times; the 14-day ATR. This adapts automatically to the stock's actual behavior and prevents getting stopped out by noise.</p>`},
  {id:"sectors",tag:"Market Structure",read:"10 min",date:"Mar 3, 2025",
   title:"Reading the Market: What Sector Rotation Tells You Before Earnings",
   excerpt:"Smart money doesn't wait for earnings reports. The rotation between sectors tells a story weeks in advance.",
   body:`<p>Institutional money moves slowly. A fund managing $10 billion can't build a position in a week. That accumulation leaves tracks in price and volume data, especially at the sector level.</p><h2>What Is Sector Rotation?</h2><p>The economy moves in cycles. As growth accelerates, certain sectors benefit more than others. This rotation often precedes the fundamental data that confirms it.</p><blockquote><p>You don't need to predict the economy. You just need to follow the money that's already moving.</p></blockquote><h2>How I Track It</h2><p>Every weekend I look at relative performance across the 11 GICS sectors over the past 4 and 13 weeks. A sector that's been leading for 13 weeks but suddenly lagging over 4 weeks is a warning sign.</p>`},
  {id:"annual2024",tag:"Annual Letter",read:"18 min",date:"Jan 7, 2025",
   title:"2024 Year in Review: What Worked, What Didn't, and What I'm Changing",
   excerpt:"My honest accounting of the year &mdash; the good trades, the costly mistakes, the psychological patterns I noticed.",
   body:`<p>Every January I sit down and write an honest post-mortem of the previous year. This year I'm sharing it publicly because the lessons were hard-won.</p><h2>The Numbers</h2><p>2024 was a strong year for momentum strategies overall. But most gains came from four trades. The other 60-odd trades were roughly break-even.</p><h2>What Worked</h2><p>Holding winners longer. In 2023 I had a habit of taking profits at 2&ndash;3R. In 2024 I used a trailing stop instead. Two trades went to 8R and 11R respectively.</p><blockquote><p>The most important skill isn't finding good setups. It's knowing when the environment doesn't support your strategy &mdash; and doing nothing.</p></blockquote><h2>What I'm Changing in 2025</h2><p>I'm adding a formal &ldquo;market regime&rdquo; filter. Before I take any new positions, I'll check whether the number of stocks making 52-week highs is expanding or contracting. If contracting, I cut maximum positions by half.</p>`}
];

function setCanvasSize(c){
  const dpr=window.devicePixelRatio||1;
  const w=Math.round((c.parentElement?c.parentElement.clientWidth:500)||500);
  const h=parseInt(c.getAttribute("data-h")||c.getAttribute("height")||200);
  c.width=w*dpr;c.height=h*dpr;c.style.width="100%";c.style.height=h+"px";
  const ctx=c.getContext("2d");ctx.scale(dpr,dpr);return{W:w,H:h};
}
function drawLine(c,o){
  const{W,H}=setCanvasSize(c);const ctx=c.getContext("2d");
  const{data,color="#c8a455",fill="rgba(200,164,85,0.08)",grid=true,pad=20}=o;
  ctx.clearRect(0,0,W,H);if(!data||data.length<2)return;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pl=pad,pr=10,pt=pad*0.5,pb=pad,cW=W-pl-pr,cH=H-pt-pb;
  const px=i=>pl+(i/(data.length-1))*cW,py=v=>pt+cH-((v-mn)/rng)*cH;
  if(grid){ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;for(let i=0;i<4;i++){const y=pt+(cH/3)*i;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(W-pr,y);ctx.stroke();}}
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));for(let i=1;i<data.length;i++)ctx.lineTo(px(i),py(data[i]));
  ctx.lineTo(px(data.length-1),pt+cH);ctx.lineTo(px(0),pt+cH);ctx.closePath();ctx.fillStyle=fill;ctx.fill();
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));for(let i=1;i<data.length;i++)ctx.lineTo(px(i),py(data[i]));
  ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.lineJoin="round";ctx.lineCap="round";ctx.stroke();
  const lx=px(data.length-1),ly=py(data[data.length-1]);
  ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}
function drawCandles(c,cs){
  const{W,H}=setCanvasSize(c);const ctx=c.getContext("2d");ctx.clearRect(0,0,W,H);if(!cs||cs.length<2)return;
  const all=cs.flatMap(x=>[x.h,x.l]),mn=Math.min(...all),mx=Math.max(...all),rng=mx-mn||1;
  const pt=15,pb=15,pl=8,pr=8,cW=W-pl-pr,cH=H-pt-pb;
  const py=v=>pt+cH-((v-mn)/rng)*cH,bw=Math.max(3,(cW/cs.length)*0.6),gap=cW/cs.length;
  ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;for(let i=0;i<4;i++){const y=pt+(cH/3)*i;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(W-pr,y);ctx.stroke();}
  cs.forEach((x,i)=>{const px2=pl+gap*i+gap/2,up=x.c>=x.o,col=up?"#27ae60":"#c0392b";
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px2,py(x.h));ctx.lineTo(px2,py(x.l));ctx.stroke();
    const bt=py(Math.max(x.o,x.c)),bb=py(Math.min(x.o,x.c)),bh=Math.max(1,bb-bt);ctx.fillStyle=col;ctx.fillRect(px2-bw/2,bt,bw,bh);});
}
function drawBars(c,setups){
  const{W,H}=setCanvasSize(c);const ctx=c.getContext("2d");ctx.clearRect(0,0,W,H);
  const pt=15,pb=34,pl=10,pr=10,cH=H-pt-pb,cW=W-pl-pr;
  const bw=Math.max(8,(cW/setups.length)*0.55),gap=cW/setups.length,fs=W<380?7:9;
  const y50=pt+cH*0.5;ctx.strokeStyle="rgba(255,255,255,0.14)";ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(pl,y50);ctx.lineTo(W-pr,y50);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle="rgba(247,245,240,0.2)";ctx.font=fs+"px IBM Plex Mono,monospace";ctx.fillText("50%",pl+2,y50-4);
  setups.forEach((s,i)=>{
    const x=pl+gap*i+gap/2,barH=cH*s.val,y=pt+cH-barH;ctx.fillStyle=s.color;ctx.fillRect(x-bw/2,y,bw,barH);
    ctx.fillStyle="rgba(247,245,240,0.5)";ctx.font=fs+"px IBM Plex Mono,monospace";ctx.textAlign="center";ctx.fillText(Math.round(s.val*100)+"%",x,y-4);
    ctx.fillStyle="rgba(247,245,240,0.24)";ctx.font=Math.max(6,fs-1)+"px IBM Plex Mono,monospace";
    const lbl=W<380?s.label.split(" ")[0]:s.label;lbl.split(" ").forEach((w,wi)=>ctx.fillText(w,x,pt+cH+12+wi*10));ctx.textAlign="left";});
}
function trend(s,e,n,ns=0.025){return Array.from({length:n},(_,i)=>{const t=i/(n-1),b=s+(e-s)*t;return Math.max(0,b+(Math.random()-0.5)*2*ns*b);});}
function mkCandles(n,p,d){const a=[];let pr=p;for(let i=0;i<n;i++){const mv=(Math.random()-0.45)*pr*0.025+d*pr*0.003,o=pr,c=pr+mv;a.push({o,h:Math.max(o,c)+Math.random()*pr*0.01,l:Math.min(o,c)-Math.random()*pr*0.01,c});pr=c;}return a;}

function initReveal(){

  document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));
}

      <div class="post-ttl">${p0.title}</div>

      <div class="post-meta" style="margin-top:0.85rem;">${p0.date}</div>
    </div>
    <div class="post-list">${[p1,p2].map(p=>`<div class="post-item" onclick="go('post','${p.id}')"><div><div class="post-tag">${p.tag}</div><div class="post-ttl">${p.title}</div><p class="post-exc">${p.excerpt}</p><div class="post-meta">${p.date} &middot; ${p.read}</div></div><div class="post-arr">${arrSvg}</div></div>`).join("")}</div>

    <div><div class="sec-eyebrow" style="color:var(--gold);">Newsletter</div><h2 class="nl-title">Weekly notes.<br>No noise.</h2><p class="nl-sub">Every Sunday &mdash; one email. Market notes, a trade I took or passed on, something I learned. ~600 words.</p></div>

}

function renderAbout(){
  return `<div class="reveal"><div class="sec-eyebrow">About Me</div><h1 class="sec-title">The goal is to win and to help win.</h1></div>

    <div class="reveal">
      <div class="photo-box">
        <img src="${PHOTO_SRC}" alt="Bittu Kumar"/>
        <div class="photo-box-bar"></div>
        <div class="photo-box-tag"><strong>Bittu Kumar</strong><span>Trader &middot; Jamui, Bihar, India</span></div>
      </div>
    </div>
    <div class="reveal">
      <div class="about-body">
        <p>I started trading equities in 2020 with ₹10,000 I'd saved from a part-time job during university. Within 14 months, I lost almost all of it &mdash; chasing tips, averaging down into losers, making every classic mistake.</p>
        <p>I didn't quit. I went back to basics: price action, volume, relative strength. I read everything I could find. I built a journal and tracked every trade obsessively. It took another two years before I was consistently profitable.</p>
        <p>Today I trade a concentrated portfolio of momentum stocks, primarily in Indian equities. No outside investors, no fund, no managed accounts. Just me, my process, and the market.</p>
      </div>
      <div class="pullquote" style="margin:1.5rem 0;">
        <p>&ldquo;I started this blog because when I was learning, there was almost no honest writing about what trading actually looks like &mdash; the long boredom, the psychological war, the weeks where the best trade is no trade.&rdquo;</p>
        <cite>&mdash; 12.04.2026</cite>
      </div>
      <h3 style="font-family:var(--serif);font-size:1.08rem;font-weight:700;margin-bottom:0.85rem;">The Three Rules I Live By</h3>
      <div class="rules-list">
        <div class="rule-item"><span class="rule-n">01</span><p><strong>Never add to a losing position.</strong> This single rule has saved me more money than any other.</p></div>
        <div class="rule-item"><span class="rule-n">02</span><p><strong>Let winners run further than feels comfortable.</strong> The biggest gains come from holding through discomfort.</p></div>
        <div class="rule-item"><span class="rule-n">03</span><p><strong>Do nothing when the environment doesn't suit your strategy.</strong> Your capital won't regenerate if you lose it in a bad tape.</p></div>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:2rem;flex-wrap:wrap;"><button class="btn-p" onclick="go('blog')">Read the Blog</button><button class="btn-s" onclick="go('contact')">Get in Touch</button></div>
    </div>
  </div>
  <div style="margin-top:2.8rem;" class="reveal">
    <div class="sec-eyebrow">Track Record</div>
    <h2 class="sec-title" style="font-size:1.5rem;margin-bottom:0.85rem;">Equity curve since inception</h2>
    <div class="chart-wrap">
      <div class="chart-header"><div><div class="chart-ticker">Composite Portfolio</div><div class="chart-price">+1,240%</div><div class="chart-change chg-up">Since 2009</div></div></div>
      <canvas id="about-equity" data-h="170" height="170"></canvas>
    </div>
  </div>`;
}

function renderBlog(){
  const tags=["All",...new Set(POSTS.map(p=>p.tag))];
  const filtered=curFilter==="All"?POSTS:POSTS.filter(p=>p.tag===curFilter);
  return `<div class="reveal"><div class="sec-eyebrow">Writing</div><h1 class="sec-title">The Blog</h1><p style="font-size:0.91rem;color:var(--muted);max-width:470px;line-height:1.75;margin-bottom:1.7rem;">Essays on momentum trading, risk management, market psychology, and what it actually takes to do this for a living.</p></div>
  <div class="filters reveal">${tags.map(t=>`<button class="filter-btn${t===curFilter?" active":""}" onclick="setFilter('${t}')">${t}</button>`).join("")}</div>
  <div class="post-list reveal">${filtered.map(p=>`<div class="post-item" onclick="go('post','${p.id}')"><div><div class="post-tag">${p.tag}</div><div class="post-ttl">${p.title}</div><p class="post-exc">${p.excerpt}</p><div class="post-meta">${p.date} &middot; ${p.read}</div></div><div class="post-arr">${arrSvg}</div></div>`).join("")}</div>`;
}

function setFilter(t){curFilter=t;go("blog");}

function renderPost(id){
  const p=POSTS.find(x=>x.id===id);
  if(!p)return`<p style="padding:2rem">Post not found.</p>`;
  return `<button class="post-back" onclick="go('blog')">${backSvg} Back to Blog</button>
  <div class="post-header"><div class="post-tag-line">${p.tag}</div><h1 class="post-main-title">${p.title}</h1><div class="post-byline"><strong>Bittu Kumar</strong><span>&middot;</span><span>${p.date}</span><span>&middot;</span><span>${p.read} read</span></div></div>
  <div class="chart-wrap reveal" style="margin-bottom:1.8rem;">
    <div class="chart-header"><div><div class="chart-ticker">Illustrative &mdash; Momentum Setup</div></div><div style="font-family:var(--mono);font-size:0.56rem;color:rgba(247,245,240,0.2);">Example chart</div></div>
    <canvas id="post-chart" data-h="140" height="140"></canvas>
  </div>
  <div class="post-content reveal">${p.body}<hr class="post-divider"/><p style="font-size:0.84rem;color:var(--muted);">If you found this useful, share it with someone who might benefit.</p><div style="display:flex;gap:0.75rem;margin-top:1.3rem;flex-wrap:wrap;"><button class="btn-p" onclick="go('blog')">&larr; More Posts</button><button class="btn-s" onclick="go('contact')">Get in Touch</button></div></div>`;
}

function drawPageCharts(page){
  const sb=document.getElementById("sb-chart");
  if(sb)drawLine(sb,{data:trend(100,162,60,0.025),grid:false,pad:5});
  if(page==="home"){
    const mc=document.getElementById("main-chart");if(mc)drawLine(mc,{data:periodData["5y"](),pad:20});
    const sc=document.getElementById("spy-candle");if(sc)drawCandles(sc,mkCandles(60,480,1));
  }
  if(page==="about"){const ae=document.getElementById("about-equity");if(ae)drawLine(ae,{data:trend(100,1340,80,0.035),pad:20});}
  if(page==="post"){
    const pc=document.getElementById("post-chart");
    if(pc){const b=Array.from({length:40},(_,i)=>100+Math.sin(i/8)*4+(Math.random()-0.5)*2),k=Array.from({length:20},(_,i)=>104+i*3.5+(Math.random()-0.5)*2);drawLine(pc,{data:[...b,...k],pad:16});}
  }
  if(page==="resources"){const rc=document.getElementById("res-chart");if(rc)drawBars(rc,BAR_SETUPS);}
}

function subDone(btn){btn.textContent="\u2713 You're on the list!";btn.style.background="#27ae60";btn.style.color="#fff";btn.disabled=true;}
function contactDone(){document.getElementById("cfa").innerHTML=`<div style="text-align:center;padding:2.5rem 1rem;"><svg width="44" height="44" viewBox="0 0 44 44" fill="none" stroke="#c8a455" stroke-width="1.5" style="display:block;margin:0 auto 1.1rem;"><circle cx="22" cy="22" r="18"/><path d="M14 22l6 6 10-12"/></svg><h4 style="font-family:var(--serif);font-size:1.3rem;margin-bottom:0.45rem;">Message sent!</h4><p style="font-size:0.83rem;color:var(--muted);line-height:1.7;">I'll read it and get back to you within a few days.</p></div>`;}

let _rt;
window.addEventListener("resize",()=>{clearTimeout(_rt);_rt=setTimeout(()=>{const pg=document.querySelector(".sb-nav-link.active")?.dataset.pg||"home";drawPageCharts(pg);},150);},{passive:true});

go("home");
</script>
